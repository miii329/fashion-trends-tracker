<div
  class="relative min-h-[70vh] w-full overflow-hidden flex items-center justify-center bg-gray-50/50 rounded-3xl"
>
  <div
    class="absolute inset-0 grid grid-cols-2 md:grid-cols-3 gap-4 p-6 opacity-40 pointer-events-none scale-105"
  >
    @for (i of [1,2,3,4,5,6]; track i) {
    <div
      class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-3"
    >
      <div
        class="w-full aspect-square bg-gray-200 rounded-xl animate-pulse"
      ></div>
      <div class="h-4 bg-gray-200 rounded w-3/4 animate-pulse"></div>
      <div class="h-4 bg-gray-200 rounded w-1/2 animate-pulse"></div>
    </div>
    }
  </div>

  <div
    class="relative z-10 backdrop-blur-md bg-white/60 p-10 rounded-3xl border border-white shadow-xl text-center max-w-sm mx-4"
  >
    <div class="text-6xl mb-6 animate-bounce">🪄</div>

    <h3 class="text-xl font-bold text-gray-800 mb-3">とっておきをセレクト中</h3>

    <p class="text-sm text-gray-500 leading-relaxed mb-6">
      あなたの「お気に入りブランド」から、<br />
      最新の新作情報を一生懸命あつめています。<br />
      公開まで、どうぞお楽しみに ✨
    </p>

    <div class="flex justify-center gap-2">
      <div class="h-1.5 w-8 bg-pink-300 rounded-full animate-pulse"></div>
      <div
        class="h-1.5 w-8 bg-blue-300 rounded-full animate-pulse [animation-delay:0.2s]"
      ></div>
      <div
        class="h-1.5 w-8 bg-yellow-300 rounded-full animate-pulse [animation-delay:0.4s]"
      ></div>
    </div>
  </div>
</div>
