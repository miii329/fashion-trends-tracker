<div class="bg-azuki text-white p-4 rounded">小豆色の背景</div> -->
<main>
  <h1 class="text-[30px] font-bold text-daidai">LuvBrands</h1>
  <p class="">お気に入りのブランドを管理して最新動向をチェック</p>
  <div class="flex space-x-6">
    <a
      routerLink="/brands"
      routerLinkActive="text-daidai"
      class="hover:text-daidai transition"
    >
      ブランド一覧
    </a>
    <a
      routerLink="/new-items"
      routerLinkActive="text-daidai"
      class="hover:text-daidai transition"
    >
      新作商品
    </a>
    <a
      routerLink="/favorites"
      routerLinkActive="text-daidai"
      class="hover:text-daidai transition"
    >
      お気に入り商品
    </a>
  </div>
  <section class="content">
    <app-category-tabs
      [categories]="[
        'すべて',
        'ファッション',
        'メイク',
        'アクセサリー',
        'カラコン',
        'その他'
      ]"
      [activeCategory]="selectedCategory"
      (categoryChanged)="selectedCategory = $event"
    >
    </app-category-tabs>
    <router-outlet />
  </section>
</main>
