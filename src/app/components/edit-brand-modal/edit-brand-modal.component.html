@if (isOpen) {
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md mx-4">
    <h2 class="text-xl font-bold mb-4">ブランドを追加</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">ブランド名</label>
        <input
          type="text"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-daidai outline-none"
        />
      </div>
    </div>

    <div class="flex justify-end space-x-3 mt-6">
      <button
        (click)="closeModal()"
        class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition"
      >
        キャンセル
      </button>
      <button
        (click)="save()"
        class="px-4 py-2 bg-daidai text-white rounded-lg font-bold hover:bg-opacity-90 transition"
      >
        保存
      </button>
    </div>
  </div>
</div>
}
