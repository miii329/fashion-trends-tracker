<div class="flex space-x-2 overflow-x-auto pb-4 scrollbar-hide">
  @for (category of categories; track category) {
  <button
    (click)="selectCategory(category)"
    [class.bg-daidai]="selectedCategory === category"
    [class.text-white]="selectedCategory === category"
    [class.border-daidai]="selectedCategory === category"
    [class.bg-white]="selectedCategory !== category"
    class="px-4 py-2 rounded-full border text-sm whitespace-nowrap transition-all"
  >
    {{ category }}
  </button>
  }
</div>
